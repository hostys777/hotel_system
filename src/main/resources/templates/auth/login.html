<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 皇家御苑酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffd700;
            --secondary-gold: #ffed4e;
            --dark-gold: #b8860b;
            --luxury-black: #1a1a1a;
            --soft-white: #f8fafc;
            --elegant-gray: #64748b;
            --royal-purple: #8b5cf6;
            --deep-blue: #1e40af;
            --luxury-silver: #94a3b8;
            --warm-gray: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: 
                /* 深色遮罩层 */
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
                /* 本地豪华酒店背景图片 */
                url('/images/hotel-background.jpg?v=1'),
                /* 备用渐变 */
                linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 - 增强酒店图片效果 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                /* 微妙的灯光效果 */
                radial-gradient(ellipse at 50% 10%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 25% 15%, rgba(255, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 75% 15%, rgba(255, 255, 255, 0.08) 0%, transparent 40%);
            animation: backgroundShift 35s ease-in-out infinite;
        }

        @keyframes backgroundShift {
            0%, 100% { opacity: 1; transform: scale(1); }
            25% { opacity: 0.9; transform: scale(1.05); }
            50% { opacity: 0.8; transform: scale(1.1); }
            75% { opacity: 0.9; transform: scale(1.05); }
        }

        /* 额外的背景装饰 - 增强酒店图片效果 */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                /* 微妙的装饰效果 */
                radial-gradient(circle at 15% 25%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 25%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 15% 75%, rgba(255, 255, 255, 0.04) 0%, transparent 55%),
                radial-gradient(circle at 85% 75%, rgba(255, 255, 255, 0.04) 0%, transparent 55%);
            animation: backgroundFloat 45s ease-in-out infinite;
        }

        @keyframes backgroundFloat {
            0%, 100% { opacity: 0.3; transform: translateY(0px) rotate(0deg); }
            25% { opacity: 0.5; transform: translateY(-10px) rotate(90deg); }
            50% { opacity: 0.4; transform: translateY(-20px) rotate(180deg); }
            75% { opacity: 0.6; transform: translateY(-10px) rotate(270deg); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            margin: 0 auto;
        }

        .login-card {
            background: 
                linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.5) 100%),
                radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 215, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: visible;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-gold), var(--secondary-gold), var(--royal-purple));
            border-radius: 25px 25px 0 0;
            animation: topGlow 3s ease-in-out infinite;
        }

        @keyframes topGlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 
                0 15px 40px rgba(255, 215, 0, 0.4),
                0 0 0 4px rgba(255, 215, 0, 0.2),
                0 0 20px rgba(255, 215, 0, 0.3);
            animation: logoGlow 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes logoGlow {
            0%, 100% { 
                box-shadow: 
                    0 15px 40px rgba(255, 215, 0, 0.4),
                    0 0 0 4px rgba(255, 215, 0, 0.2),
                    0 0 20px rgba(255, 215, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    0 20px 50px rgba(255, 215, 0, 0.6),
                    0 0 0 6px rgba(255, 215, 0, 0.3),
                    0 0 30px rgba(255, 215, 0, 0.5);
            }
        }

        .login-logo i {
            font-size: 2.5rem;
            color: var(--luxury-black);
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--soft-white);
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .login-subtitle {
            color: var(--luxury-silver);
            font-size: 1.2rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-label {
            color: var(--soft-white);
            font-weight: 600;
            margin-bottom: 12px;
            display: block;
            font-size: 1.1rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--soft-white);
            padding: 18px 25px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            height: 55px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            color: var(--soft-white);
        }

        .form-control::placeholder {
            color: rgba(248, 250, 252, 0.6);
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--luxury-silver);
            z-index: 10;
            font-size: 1.2rem;
        }

        .input-group .form-control {
            padding-left: 70px;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
            border: none;
            border-radius: 15px;
            color: var(--luxury-black);
            font-weight: 700;
            font-size: 1.2rem;
            padding: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            height: 60px;
            box-shadow: 
                0 8px 25px rgba(255, 215, 0, 0.3),
                0 0 0 1px rgba(255, 215, 0, 0.2);
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 15px 35px rgba(255, 215, 0, 0.5),
                0 0 0 2px rgba(255, 215, 0, 0.3),
                0 0 25px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, var(--secondary-gold), var(--primary-gold));
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .role-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .role-info h6 {
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.1rem;
        }

        .role-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .role-item:last-child {
            border-bottom: none;
        }

        .role-name {
            color: var(--soft-white);
            font-weight: 500;
            font-size: 1rem;
        }

        .role-level {
            color: var(--luxury-silver);
            font-size: 0.9rem;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-element {
            position: absolute;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            width: 60px;
            height: 60px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            width: 40px;
            height: 40px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 20px;
                max-width: 500px;
            }
            
            .login-card {
                padding: 30px 20px;
            }
            
            .login-title {
                font-size: 2rem;
            }
            
            .login-logo {
                width: 80px;
                height: 80px;
            }
            
            .login-logo i {
                font-size: 2rem;
            }
            
            .role-info {
                margin-top: 20px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 浮动装饰元素 -->
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-crown"></i>
                </div>
                <h1 class="login-title">皇家御苑酒店</h1>
                <p class="login-subtitle">管理系统登录</p>
            </div>

            <!-- 消息提示 -->
            <div th:if="${success}" class="alert alert-success" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- 登录表单 -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" 
                               class="form-control" 
                               id="username" 
                               name="username" 
                               placeholder="请输入用户名"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="请输入密码"
                               required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>
                    登录系统
                </button>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
