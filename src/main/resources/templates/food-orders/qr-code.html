<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码支付 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }
        .qr-code {
            width: 250px;
            height: 250px;
            background: white;
            border: 3px solid #dee2e6;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        .qr-code canvas {
            border-radius: 12px;
        }
        .amount-display {
            font-size: 2rem;
            font-weight: bold;
            color: #28a745;
            margin: 20px 0;
        }
        .payment-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .countdown {
            font-size: 1.2rem;
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-hotel me-2"></i>酒店管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/rooms">房间管理</a>
                <a class="nav-link" href="/customers">客户管理</a>
                <a class="nav-link" href="/reservations">预订管理</a>
                <a class="nav-link active" href="/food-orders">餐饮订单</a>
                <a class="nav-link" href="/employees">员工管理</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="qr-container">
                    <h3><i class="fas fa-qrcode me-2"></i>扫码支付</h3>
                    
                    <!-- 订单信息 -->
                    <div class="payment-info">
                        <p><strong>订单号：</strong><span th:text="${order.id}"></span></p>
                        <p><strong>客户：</strong><span th:text="${order.customer.name}"></span></p>
                        <p><strong>桌号：</strong><span th:text="${order.tableNumber}"></span></p>
                    </div>
                    
                    <!-- 支付金额 -->
                    <div class="amount-display">
                        ¥<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
                    </div>
                    
                    <!-- 二维码 -->
                    <div class="qr-code" id="qrCodeContainer">
                        <!-- 二维码将在这里生成 -->
                    </div>
                    
                    <!-- 支付说明 -->
                    <p class="text-muted mb-3">请使用微信或支付宝扫描上方二维码</p>
                    
                    <!-- 倒计时 -->
                    <div class="countdown" id="countdown">
                        支付倒计时：<span id="timer">300</span> 秒
                    </div>
                    
                    <!-- 支付状态 -->
                    <div class="alert alert-info mt-3" id="paymentStatus">
                        <i class="fas fa-info-circle me-2"></i>
                        等待支付中...
                    </div>
                    
                    <!-- 操作按钮 -->
                    <div class="mt-4">
                        <a href="/food-orders" class="btn btn-secondary me-2">
                            <i class="fas fa-arrow-left me-1"></i>返回订单列表
                        </a>
                        <button class="btn btn-success" onclick="simulatePayment()">
                            <i class="fas fa-check me-1"></i>模拟支付成功
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let timeLeft = 300; // 5分钟倒计时
        let timer = null;
        
        // 倒计时功能
        function startCountdown() {
            timer = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('paymentStatus').innerHTML = 
                        '<i class="fas fa-exclamation-triangle me-2"></i>支付超时，请重新生成二维码';
                    document.getElementById('paymentStatus').className = 'alert alert-warning mt-3';
                }
            }, 1000);
        }
        
        // 模拟支付成功
        function simulatePayment() {
            clearInterval(timer);
            document.getElementById('paymentStatus').innerHTML = 
                '<i class="fas fa-check-circle me-2"></i>支付成功！正在跳转...';
            document.getElementById('paymentStatus').className = 'alert alert-success mt-3';
            
            // 模拟支付处理
            setTimeout(function() {
                // 这里应该调用实际的支付接口
                window.location.href = '/food-orders/pay/' + /*[[${order.id}]]*/ + '?paymentMethod=ONLINE';
            }, 2000);
        }
        
        // 生成本地模拟二维码
        function generateQRCode() {
            const container = document.getElementById('qrCodeContainer');
            container.innerHTML = '<div class="text-center text-muted"><i class="fas fa-spinner fa-spin"></i><br>正在生成二维码...</div>';
            
            // 生成支付链接（模拟）
            const orderId = /*[[${order.id}]]*/ null;
            const amount = /*[[${order.totalAmount}]]*/ null;
            const customerName = /*[[${order.customer.name}]]*/ null;
            const tableNumber = /*[[${order.tableNumber}]]*/ null;
            
            // 如果订单数据不可用，使用随机数据
            const finalOrderId = orderId || Math.floor(Math.random() * 10000) + 1000;
            const finalAmount = amount || (Math.random() * 100 + 10).toFixed(2);
            const finalCustomerName = customerName || '客户' + Math.floor(Math.random() * 100);
            const finalTableNumber = tableNumber || Math.floor(Math.random() * 20) + 1;
            
            // 生成更真实的支付链接
            const paymentData = {
                orderId: finalOrderId,
                amount: finalAmount,
                customer: finalCustomerName,
                table: finalTableNumber,
                timestamp: Date.now(),
                merchant: '酒店管理系统',
                description: '餐饮订单支付'
            };
            
            const paymentUrl = `weixin://wxpay/bizpayurl?pr=${btoa(JSON.stringify(paymentData))}`;
            
            console.log('生成二维码，订单信息:', paymentData);
            console.log('支付URL:', paymentUrl);
            
            // 模拟生成二维码
            setTimeout(() => {
                container.innerHTML = '';
                
                // 创建二维码容器
                const qrDiv = document.createElement('div');
                qrDiv.className = 'local-qr-code';
                qrDiv.style.cssText = `
                    width: 220px;
                    height: 220px;
                    background: white;
                    border: 3px solid #000;
                    position: relative;
                    margin: 0 auto;
                    display: grid;
                    grid-template-columns: repeat(25, 1fr);
                    grid-template-rows: repeat(25, 1fr);
                    gap: 1px;
                    padding: 3px;
                `;
                
                // 生成模拟二维码图案
                generateQRPattern(qrDiv, finalOrderId, finalAmount);
                
                container.appendChild(qrDiv);
                console.log('本地二维码生成成功');
            }, 500);
        }
        
        // 生成模拟二维码图案
        function generateQRPattern(container, orderId, amount) {
            // 基于订单ID和金额生成伪随机图案
            const seed = orderId + parseInt(amount.replace('.', ''));
            const random = new SeededRandom(seed);
            
            // 生成25x25的网格
            for (let row = 0; row < 25; row++) {
                for (let col = 0; col < 25; col++) {
                    const cell = document.createElement('div');
                    
                    // 确定位置模式
                    let isBlack = false;
                    
                    // 三个角落的定位点
                    if ((row < 9 && col < 9) || 
                        (row < 9 && col > 15) || 
                        (row > 15 && col < 9)) {
                        // 定位点外框
                        if ((row === 0 || row === 8) && col >= 0 && col <= 8) isBlack = true;
                        if ((col === 0 || col === 8) && row >= 0 && row <= 8) isBlack = true;
                        // 定位点内部
                        if (row >= 2 && row <= 6 && col >= 2 && col <= 6) isBlack = true;
                    }
                    // 中心点
                    else if (row === 12 && col === 12) {
                        isBlack = true;
                    }
                    // 其他位置使用伪随机
                    else {
                        isBlack = random.next() > 0.5;
                    }
                    
                    cell.style.backgroundColor = isBlack ? '#000' : '#fff';
                    cell.style.border = 'none';
                    container.appendChild(cell);
                }
            }
        }
        
        // 简单的伪随机数生成器
        function SeededRandom(seed) {
            this.seed = seed;
            this.next = function() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            };
        }
        
        // 页面加载完成后开始倒计时和生成二维码
        document.addEventListener('DOMContentLoaded', function() {
            startCountdown();
            generateQRCode();
        });
        
        // 页面卸载时清除定时器
        window.addEventListener('beforeunload', function() {
            if (timer) {
                clearInterval(timer);
            }
        });
    </script>
</body>
</html>
