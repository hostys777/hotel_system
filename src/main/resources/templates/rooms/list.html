<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房间管理 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/button-styles.css" rel="stylesheet">
    <link href="/css/form-styles.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 30px;
        }
        .page-header {
            background: linear-gradient(135deg, #c9a96e 0%, #8b7355 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(201, 169, 110, 0.3);
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .room-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #c9a96e, #8b7355);
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .room-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }
        .room-type {
            font-size: 1.1rem;
            color: #d4af37;
            font-weight: 500;
            margin-bottom: 15px;
        }
        .room-price {
            font-size: 1.3rem;
            font-weight: 600;
            color: #8b7355;
            margin-bottom: 15px;
        }
        .room-description {
            color: #718096;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-available {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }
        .status-occupied {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }
        .status-reserved {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            color: white;
        }
        .status-maintenance {
            background: linear-gradient(135deg, #a0aec0, #718096);
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-modern {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-edit {
            background: linear-gradient(135deg, #c9a96e, #d4af37);
            color: white;
        }
        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244, 208, 63, 0.3);
            color: white;
        }
        .btn-delete {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 101, 101, 0.3);
            color: white;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, #c9a96e, #d4af37);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 500;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244, 208, 63, 0.3);
            color: white;
        }
        .btn-success-modern {
            background: linear-gradient(135deg, #48bb78, #38a169);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 500;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-success-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #718096;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }
        .navbar-modern {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand-modern {
            font-weight: 700;
            color: #ffd700 !important;
            font-size: 1.3rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        .nav-link-modern {
            color: #2d3748 !important;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .nav-link-modern:hover {
            color: #ffd700 !important;
            transform: translateY(-1px);
        }
        .nav-link-modern.active {
            color: #ffd700 !important;
            font-weight: 600;
        }
        
        /* 豪华导航栏样式 */
        .luxury-navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        
        
        .luxury-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .luxury-nav-link {
            color: #f8f9fa !important;
            font-weight: 500;
            padding: 12px 20px !important;
            margin: 0 5px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .luxury-nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .luxury-nav-link:hover::before {
            left: 100%;
        }
        
        .luxury-nav-link:hover {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        
        .luxury-nav-link.active {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.15);
        }
        
        /* 调整主容器顶部间距 */
        .main-container {
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <!-- 豪华导航栏 -->
    <nav class="navbar navbar-expand-lg luxury-navbar">
        <div class="container">
            <a class="navbar-brand luxury-brand" href="/">
                <i class="fas fa-crown me-2"></i>皇家御苑酒店管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: #3b82f6;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/">
                            <i class="fas fa-home me-1"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link active" href="/rooms">
                            <i class="fas fa-bed me-1"></i>房间管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/customers">
                            <i class="fas fa-users me-1"></i>客户管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/employees">
                            <i class="fas fa-users-cog me-1"></i>员工管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/reservations">
                            <i class="fas fa-calendar-check me-1"></i>预订管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/food-orders">
                            <i class="fas fa-utensils me-1"></i>餐饮订单
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/parking">
                            <i class="fas fa-parking me-1"></i>停车管理
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-2"><i class="fas fa-bed me-3"></i>房间管理</h1>
                    <p class="mb-0 opacity-75">管理酒店房间信息，查看房间状态和可用性</p>
                </div>
                <div class="d-flex gap-3">
                    <a href="/rooms/add" class="btn-luxury btn-luxury-primary">
                        <i class="fas fa-plus me-2"></i>添加房间
                    </a>
                    <a href="/rooms/available" class="btn-luxury btn-luxury-success">
                        <i class="fas fa-eye me-2"></i>查看可用房间
                    </a>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(rooms)}">0</div>
                <div class="stat-label">总房间数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(rooms.?[status.name() == 'AVAILABLE'])}">0</div>
                <div class="stat-label">可用房间</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(rooms.?[status.name() == 'OCCUPIED'])}">0</div>
                <div class="stat-label">已入住</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(rooms.?[status.name() == 'RESERVED'])}">0</div>
                <div class="stat-label">已预订</div>
            </div>
        </div>


        <!-- 房间卡片网格 -->
        <div class="row" th:if="${#lists.size(rooms) > 0}">
            <div class="col-lg-4 col-md-6 mb-4" th:each="room : ${rooms}">
                <div class="room-card">
                    <div class="room-number" th:text="'房间 ' + ${room.roomNumber}">房间 101</div>
                    <div class="room-type" th:text="${room.roomType.description}">标准间</div>
                    <div class="room-price">¥<span th:text="${#numbers.formatDecimal(room.price, 1, 2)}">299.00</span>/晚</div>
                    <div class="room-description" th:text="${room.description}">舒适的标准间，配备现代化设施</div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="status-badge" 
                              th:classappend="${room.status.name() == 'AVAILABLE'} ? 'status-available' : 
                                             (${room.status.name() == 'OCCUPIED'} ? 'status-occupied' : 
                                              (${room.status.name() == 'RESERVED'} ? 'status-reserved' : 'status-maintenance'))"
                              th:text="${room.status.description}">可用</span>
                        <div class="d-flex align-items-center">
                            <i class="fas fa-wifi text-muted me-2"></i>
                            <i class="fas fa-tv text-muted me-2"></i>
                            <i class="fas fa-snowflake text-muted"></i>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <a th:href="@{/rooms/edit/{id}(id=${room.roomNumber})}" 
                           class="btn-luxury btn-luxury-warning btn-luxury-sm">
                            <i class="fas fa-edit me-1"></i>编辑
                        </a>
                        <a th:href="@{/rooms/delete/{id}(id=${room.roomNumber})}" 
                           class="btn-luxury btn-luxury-danger btn-luxury-sm"
                           onclick="return confirm('确定要删除这个房间吗？')">
                            <i class="fas fa-trash me-1"></i>删除
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="text-center py-5" th:if="${#lists.isEmpty(rooms)}">
            <div class="mb-4">
                <i class="fas fa-bed" style="font-size: 4rem; color: #cbd5e0;"></i>
            </div>
            <h3 class="text-muted mb-3">暂无房间信息</h3>
            <p class="text-muted mb-4">开始添加您的第一个房间吧！</p>
            <a href="/rooms/add" class="btn-luxury btn-luxury-primary">
                <i class="fas fa-plus me-2"></i>添加房间
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
