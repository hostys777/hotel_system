<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可用房间 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f4d03f 0%, #f39c12 50%, #e67e22 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 30px;
        }
        .page-header {
            background: linear-gradient(135deg, #f4d03f 0%, #f39c12 50%, #e67e22 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(244, 208, 63, 0.3);
        }
        .room-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(72, 187, 120, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f4d03f, #f39c12, #e67e22);
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .room-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }
        .room-type {
            font-size: 1.1rem;
            color: #f39c12;
            font-weight: 500;
            margin-bottom: 15px;
        }
        .room-price {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e67e22;
            margin-bottom: 15px;
        }
        .room-description {
            color: #718096;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .btn-modern {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-edit {
            background: linear-gradient(135deg, #f4d03f, #f39c12);
            color: white;
        }
        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244, 208, 63, 0.3);
            color: white;
        }
        .btn-back {
            background: #f1f5f9;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }
        .btn-back:hover {
            background: #e2e8f0;
            color: #2d3748;
            transform: translateY(-2px);
        }
        /* 豪华导航栏样式 */
        .luxury-navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        
        .luxury-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .luxury-nav-link {
            color: #f8f9fa !important;
            font-weight: 500;
            padding: 12px 20px !important;
            margin: 0 5px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .luxury-nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .luxury-nav-link:hover::before {
            left: 100%;
        }
        
        .luxury-nav-link:hover {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        
        .luxury-nav-link.active {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.15);
        }
        
        /* 调整主容器顶部间距 */
        .main-container {
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <!-- 豪华导航栏 -->
    <nav class="navbar navbar-expand-lg luxury-navbar">
        <div class="container">
            <a class="navbar-brand luxury-brand" href="/">
                <i class="fas fa-crown me-2"></i>皇家御苑酒店管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: #3b82f6;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/">
                            <i class="fas fa-home me-1"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link active" href="/rooms">
                            <i class="fas fa-bed me-1"></i>房间管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/customers">
                            <i class="fas fa-users me-1"></i>客户管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/employees">
                            <i class="fas fa-users-cog me-1"></i>员工管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/reservations">
                            <i class="fas fa-calendar-check me-1"></i>预订管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/food-orders">
                            <i class="fas fa-utensils me-1"></i>餐饮订单
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/parking">
                            <i class="fas fa-parking me-1"></i>停车管理
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-2"><i class="fas fa-eye me-3"></i>可用房间</h1>
                    <p class="mb-0 opacity-75">查看当前可预订的房间信息</p>
                </div>
                <a href="/rooms" class="btn-back">
                    <i class="fas fa-arrow-left"></i>返回房间列表
                </a>
            </div>
        </div>

        <!-- 房间卡片网格 -->
        <div class="row" th:if="${#lists.size(rooms) > 0}">
            <div class="col-lg-4 col-md-6 mb-4" th:each="room : ${rooms}">
                <div class="room-card">
                    <div class="room-number" th:text="'房间 ' + ${room.roomNumber}">房间 101</div>
                    <div class="room-type" th:text="${room.roomType.description}">标准间</div>
                    <div class="room-price">¥<span th:text="${#numbers.formatDecimal(room.price, 1, 2)}">299.00</span>/晚</div>
                    <div class="room-description" th:text="${room.description}">舒适的标准间，配备现代化设施</div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-success px-3 py-2 rounded-pill">
                            <i class="fas fa-check-circle me-1"></i>可用
                        </span>
                        <div class="d-flex align-items-center">
                            <i class="fas fa-wifi text-muted me-2"></i>
                            <i class="fas fa-tv text-muted me-2"></i>
                            <i class="fas fa-snowflake text-muted"></i>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a th:href="@{/rooms/edit/{id}(id=${room.roomNumber})}" 
                           class="btn-modern btn-edit">
                            <i class="fas fa-edit"></i>编辑
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="text-center py-5" th:if="${#lists.isEmpty(rooms)}">
            <div class="mb-4">
                <i class="fas fa-bed" style="font-size: 4rem; color: #cbd5e0;"></i>
            </div>
            <h3 class="text-muted mb-3">暂无可用房间</h3>
            <p class="text-muted mb-4">所有房间都已被预订或正在维护中</p>
            <a href="/rooms" class="btn-back">
                <i class="fas fa-arrow-left"></i>返回房间列表
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
