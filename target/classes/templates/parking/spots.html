<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车位管理 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-badge {
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
        }
        .spot-card {
            transition: transform 0.2s ease;
        }
        .spot-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-hotel me-2"></i>酒店管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/rooms">房间管理</a>
                <a class="nav-link" href="/customers">客户管理</a>
                <a class="nav-link" href="/reservations">预订管理</a>
                <a class="nav-link" href="/food-orders">餐饮订单</a>
                <a class="nav-link" href="/employees">员工管理</a>
                <a class="nav-link active" href="/parking">停车管理</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-parking me-2"></i>停车位管理</h2>
                    <a href="/parking/spots/add" class="btn btn-primary">
                        <i class="fas fa-plus me-1"></i>添加停车位
                    </a>
                </div>

                <!-- 消息提示 -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- 停车位列表 -->
                <div class="row" th:if="${spots != null and !spots.isEmpty()}">
                    <div class="col-md-6 col-lg-4 mb-3" th:each="spot : ${spots}">
                        <div class="card spot-card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title mb-0" th:text="${spot.spotNumber}">A01</h5>
                                    <span class="badge status-badge" 
                                          th:classappend="${spot.status.name() == 'AVAILABLE'} ? 'bg-success' : 
                                                        (${spot.status.name() == 'OCCUPIED'} ? 'bg-danger' : 
                                                         (${spot.status.name() == 'MAINTENANCE'} ? 'bg-warning' : 'bg-secondary'))"
                                          th:text="${spot.status.description}">可用</span>
                                </div>
                                
                                <div class="mb-2">
                                    <small class="text-muted">类型：</small>
                                    <span th:text="${spot.spotType.description}">标准车位</span>
                                </div>
                                
                                <div class="mb-2">
                                    <small class="text-muted">位置：</small>
                                    <span th:text="${spot.location}">地下车库A区</span>
                                </div>
                                
                                <div class="mb-2">
                                    <small class="text-muted">费率：</small>
                                    <span class="text-primary fw-bold">¥<span th:text="${#numbers.formatDecimal(spot.hourlyRate, 1, 2)}">5.00</span>/小时</span>
                                </div>
                                
                                <div th:if="${spot.description != null and !spot.description.isEmpty()}" class="mb-3">
                                    <small class="text-muted">描述：</small>
                                    <p class="small mb-0" th:text="${spot.description}">靠近电梯口</p>
                                </div>
                                
                                <div class="d-flex gap-2">
                                    <a th:href="@{/parking/spots/edit/{id}(id=${spot.id})}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit me-1"></i>编辑
                                    </a>
                                    <button class="btn btn-sm btn-outline-danger" 
                                            th:onclick="'deleteSpot(' + ${spot.id} + ')'">
                                        <i class="fas fa-trash me-1"></i>删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 空状态 -->
                <div th:if="${spots == null or spots.isEmpty()}" class="text-center py-5">
                    <i class="fas fa-parking fa-4x text-muted mb-3"></i>
                    <h4 class="text-muted">暂无停车位</h4>
                    <p class="text-muted">点击上方按钮添加第一个停车位</p>
                    <a href="/parking/spots/add" class="btn btn-primary">
                        <i class="fas fa-plus me-1"></i>添加停车位
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    确定要删除这个停车位吗？此操作不可撤销。
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <form id="deleteForm" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger">删除</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function deleteSpot(spotId) {
            document.getElementById('deleteForm').action = '/parking/spots/delete/' + spotId;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
    </script>
</body>
</html>
