<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车记录 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-badge {
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
        }
        .record-card {
            transition: transform 0.2s ease;
        }
        .record-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .duration-text {
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-hotel me-2"></i>酒店管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/rooms">房间管理</a>
                <a class="nav-link" href="/customers">客户管理</a>
                <a class="nav-link" href="/reservations">预订管理</a>
                <a class="nav-link" href="/food-orders">餐饮订单</a>
                <a class="nav-link" href="/employees">员工管理</a>
                <a class="nav-link active" href="/parking">停车管理</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-list me-2"></i>停车记录</h2>
                    <a href="/parking/checkin" class="btn btn-success">
                        <i class="fas fa-plus me-1"></i>车辆入场
                    </a>
                </div>

                <!-- 消息提示 -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- 停车记录列表 -->
                <div class="row" th:if="${records != null and !records.isEmpty()}">
                    <div class="col-12 mb-3" th:each="record : ${records}">
                        <div class="card record-card">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-md-2">
                                        <div class="text-center">
                                            <i class="fas fa-car fa-2x text-primary mb-2"></i>
                                            <div class="fw-bold" th:text="${record.licensePlate}">京A12345</div>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-3">
                                        <div class="mb-1">
                                            <strong>客户：</strong>
                                            <span th:text="${record.customer.name}">张三</span>
                                        </div>
                                        <div class="mb-1">
                                            <strong>停车位：</strong>
                                            <span th:text="${record.parkingSpot.spotNumber}">A01</span>
                                        </div>
                                        <div class="mb-1">
                                            <strong>类型：</strong>
                                            <span th:text="${record.vehicleType != null ? record.vehicleType : '未填写'}">轿车</span>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-3">
                                        <div class="mb-1">
                                            <strong>入场时间：</strong>
                                            <span th:text="${#temporals.format(record.entryTime, 'yyyy-MM-dd HH:mm')}">2024-01-15 14:30</span>
                                        </div>
                                        <div class="mb-1" th:if="${record.exitTime != null}">
                                            <strong>出场时间：</strong>
                                            <span th:text="${#temporals.format(record.exitTime, 'yyyy-MM-dd HH:mm')}">2024-01-15 16:30</span>
                                        </div>
                                        <div class="mb-1" th:if="${record.durationMinutes != null}">
                                            <strong>停车时长：</strong>
                                            <span class="duration-text text-primary" th:text="${#strings.concat(record.durationMinutes, ' 分钟')}">120 分钟</span>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-2">
                                        <div class="mb-1">
                                            <strong>费用：</strong>
                                            <span th:if="${record.totalFee != null}" 
                                                  class="text-success fw-bold" 
                                                  th:text="'¥' + ${#numbers.formatDecimal(record.totalFee, 1, 2)}">¥10.00</span>
                                            <span th:if="${record.totalFee == null}" class="text-muted">待计算</span>
                                        </div>
                                        <div class="mb-1">
                                            <span class="badge status-badge" 
                                                  th:class="${record.status.name() == 'ACTIVE'} ? 'status-badge bg-success' : 
                                                           (${record.status.name() == 'COMPLETED'} ? 'status-badge bg-primary' : 
                                                            (${record.status.name() == 'CANCELLED'} ? 'status-badge bg-secondary' : 'status-badge bg-warning'))"
                                                  th:text="${record.status.description}">进行中</span>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-2 text-end">
                                        <div th:if="${record.status.name() == 'ACTIVE'}">
                                            <form th:action="@{/parking/checkout/{id}(id=${record.id})}" method="post" style="display: inline;">
                                                <button type="submit" class="btn btn-warning btn-sm" 
                                                        onclick="return confirm('确认车辆出场？')">
                                                    <i class="fas fa-sign-out-alt me-1"></i>出场
                                                </button>
                                            </form>
                                        </div>
                                        <div th:if="${record.notes != null and !record.notes.isEmpty()}" class="mt-2">
                                            <small class="text-muted" th:text="${record.notes}">备注信息</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 空状态 -->
                <div th:if="${records == null or records.isEmpty()}" class="text-center py-5">
                    <i class="fas fa-list fa-4x text-muted mb-3"></i>
                    <h4 class="text-muted">暂无停车记录</h4>
                    <p class="text-muted">点击上方按钮进行车辆入场登记</p>
                    <a href="/parking/checkin" class="btn btn-success">
                        <i class="fas fa-plus me-1"></i>车辆入场
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
