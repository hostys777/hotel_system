<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑停车位 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-hotel me-2"></i>酒店管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/rooms">房间管理</a>
                <a class="nav-link" href="/customers">客户管理</a>
                <a class="nav-link" href="/reservations">预订管理</a>
                <a class="nav-link" href="/food-orders">餐饮订单</a>
                <a class="nav-link" href="/employees">员工管理</a>
                <a class="nav-link active" href="/parking">停车管理</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-edit me-2"></i>编辑停车位</h4>
                    </div>
                    <div class="card-body">
                        <!-- 消息提示 -->
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/parking/spots/edit/{id}(id=${spot.id})}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="spotNumber" class="form-label">停车位编号 *</label>
                                    <input type="text" class="form-control" id="spotNumber" name="spotNumber" 
                                           th:value="${spot.spotNumber}" placeholder="如：A01, B02" required>
                                    <div class="form-text">请输入唯一的停车位编号</div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="spotType" class="form-label">停车位类型 *</label>
                                    <select class="form-select" id="spotType" name="spotType" required>
                                        <option value="">请选择类型</option>
                                        <option th:each="type : ${spotTypes}" 
                                                th:value="${type}" 
                                                th:selected="${type == spot.spotType}"
                                                th:text="${type.description}">标准车位</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="status" class="form-label">停车位状态 *</label>
                                    <select class="form-select" id="status" name="status" required>
                                        <option value="">请选择状态</option>
                                        <option th:each="status : ${spotStatuses}" 
                                                th:value="${status}" 
                                                th:selected="${status == spot.status}"
                                                th:text="${status.description}">可用</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="location" class="form-label">位置 *</label>
                                    <input type="text" class="form-control" id="location" name="location" 
                                           th:value="${spot.location}" placeholder="如：地下车库A区" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="hourlyRate" class="form-label">每小时费用 *</label>
                                    <div class="input-group">
                                        <span class="input-group-text">¥</span>
                                        <input type="number" class="form-control" id="hourlyRate" name="hourlyRate" 
                                               step="0.01" min="0" th:value="${spot.hourlyRate}" placeholder="5.00" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="isReserved" class="form-label">是否预订</label>
                                    <div class="form-check mt-2">
                                        <input class="form-check-input" type="checkbox" id="isReserved" name="isReserved" 
                                               th:checked="${spot.isReserved}">
                                        <label class="form-check-label" for="isReserved">
                                            已预订
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">描述</label>
                                <textarea class="form-control" id="description" name="description" rows="3" 
                                          th:text="${spot.description}" placeholder="如：靠近电梯口，方便出入"></textarea>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/parking/spots" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-1"></i>返回
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>保存
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
