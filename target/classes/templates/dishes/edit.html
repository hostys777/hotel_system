<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑菜品 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #dc2626 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px;
            margin-top: 100px;
        }
        .page-header {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #dc2626 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(230, 126, 34, 0.3);
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 0.2rem rgba(249, 115, 22, 0.25);
        }
        .btn-modern {
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }
        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
            color: white;
        }
        .btn-secondary-modern {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }
        .btn-secondary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(107, 114, 128, 0.3);
            color: white;
        }
        .luxury-navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #f97316;
            box-shadow: 0 4px 30px rgba(249, 115, 22, 0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .luxury-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #f97316 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .luxury-nav-link {
            color: #f8f9fa !important;
            font-weight: 500;
            padding: 12px 20px !important;
            margin: 0 5px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .luxury-nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.2), transparent);
            transition: left 0.5s ease;
        }
        .luxury-nav-link:hover::before {
            left: 100%;
        }
        .luxury-nav-link:hover {
            color: #f97316 !important;
            background: rgba(249, 115, 22, 0.1);
            transform: translateY(-2px);
        }
        .luxury-nav-link.active {
            color: #f97316 !important;
            background: rgba(249, 115, 22, 0.15);
        }
        .alert {
            border-radius: 15px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
        }
        .alert-danger {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }
        .form-check-input:checked {
            background-color: #f97316;
            border-color: #f97316;
        }
        .form-check-input:focus {
            box-shadow: 0 0 0 0.2rem rgba(249, 115, 22, 0.25);
        }
        .price-input-group {
            position: relative;
        }
        .price-symbol {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-weight: 600;
        }
        .price-input {
            padding-left: 30px;
        }
        .dish-info-card {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border: 1px solid #cbd5e1;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .dish-info-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
        }
        .dish-info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .dish-info-item:last-child {
            border-bottom: none;
        }
        .dish-info-label {
            font-weight: 500;
            color: #4a5568;
        }
        .dish-info-value {
            color: #2d3748;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 豪华导航栏 -->
    <nav class="navbar navbar-expand-lg luxury-navbar">
        <div class="container">
            <a class="navbar-brand luxury-brand" href="/">
                <i class="fas fa-crown me-2"></i>皇家御苑酒店管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: #f97316;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/">
                            <i class="fas fa-home me-1"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/rooms">
                            <i class="fas fa-bed me-1"></i>房间管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/customers">
                            <i class="fas fa-users me-1"></i>客户管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/employees">
                            <i class="fas fa-users-cog me-1"></i>员工管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/reservations">
                            <i class="fas fa-calendar-check me-1"></i>预订管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/food-orders">
                            <i class="fas fa-utensils me-1"></i>餐饮订单
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link active" href="/dishes">
                            <i class="fas fa-utensils me-1"></i>菜品管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/parking">
                            <i class="fas fa-parking me-1"></i>停车管理
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-2"><i class="fas fa-edit me-3"></i>编辑菜品</h1>
                    <p class="mb-0 opacity-75">修改菜品信息</p>
                </div>
                <a href="/dishes" class="btn btn-light">
                    <i class="fas fa-arrow-left me-2"></i>返回列表
                </a>
            </div>
        </div>

        <!-- 消息提示 -->
        <div th:if="${successMessage}" class="alert alert-success" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- 菜品信息卡片 -->
        <div class="dish-info-card">
            <div class="dish-info-title">
                <i class="fas fa-info-circle me-2"></i>菜品信息
            </div>
            <div class="dish-info-item">
                <span class="dish-info-label">菜品ID</span>
                <span class="dish-info-value" th:text="${dish.id}">#001</span>
            </div>
            <div class="dish-info-item">
                <span class="dish-info-label">当前状态</span>
                <span class="dish-info-value" th:text="${dish.isAvailable ? '可用' : '已禁用'}">可用</span>
            </div>
            <div class="dish-info-item">
                <span class="dish-info-label">创建时间</span>
                <span class="dish-info-value" th:text="${#temporals.format(dish.id, 'yyyy-MM-dd HH:mm')}">2024-01-01 10:00</span>
            </div>
        </div>

        <!-- 编辑表单 -->
        <div class="form-container">
            <form th:action="@{/dishes/edit/{id}(id=${dish.id})}" th:object="${dish}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="name" class="form-label">菜品名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" 
                               placeholder="请输入菜品名称" required>
                        <div class="form-text">请输入菜品的完整名称</div>
                    </div>
                    
                    <div class="col-md-6 mb-4">
                        <label for="category" class="form-label">菜品分类 <span class="text-danger">*</span></label>
                        <select class="form-select" id="category" th:field="*{category}" required>
                            <option value="">请选择分类</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                            <option value="热菜">热菜</option>
                            <option value="凉菜">凉菜</option>
                            <option value="汤品">汤品</option>
                            <option value="主食">主食</option>
                            <option value="饮品">饮品</option>
                            <option value="甜品">甜品</option>
                        </select>
                        <div class="form-text">选择菜品所属的分类</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="price" class="form-label">价格 <span class="text-danger">*</span></label>
                        <div class="price-input-group">
                            <span class="price-symbol">¥</span>
                            <input type="number" class="form-control price-input" id="price" th:field="*{price}" 
                                   placeholder="0.00" step="0.01" min="0" required>
                        </div>
                        <div class="form-text">请输入菜品价格（元）</div>
                    </div>
                    
                    <div class="col-md-6 mb-4">
                        <label for="stockQuantity" class="form-label">库存数量</label>
                        <input type="number" class="form-control" id="stockQuantity" th:field="*{stockQuantity}" 
                               placeholder="0" min="0">
                        <div class="form-text">设置菜品的库存数量</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">菜品描述</label>
                    <textarea class="form-control" id="description" th:field="*{description}" 
                              rows="4" placeholder="请输入菜品的详细描述，包括口味、特色等"></textarea>
                    <div class="form-text">详细描述菜品的特点和口味</div>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isAvailable" th:field="*{isAvailable}">
                        <label class="form-check-label" for="isAvailable">
                            启用此菜品
                        </label>
                        <div class="form-text">勾选后菜品可用于订单</div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn-modern btn-primary-modern">
                        <i class="fas fa-save"></i>保存修改
                    </button>
                    <a href="/dishes" class="btn-modern btn-secondary-modern">
                        <i class="fas fa-times"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 表单验证
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const nameInput = document.getElementById('name');
            const priceInput = document.getElementById('price');
            const categorySelect = document.getElementById('category');
            
            form.addEventListener('submit', function(e) {
                let isValid = true;
                
                // 验证菜品名称
                if (nameInput.value.trim() === '') {
                    nameInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    nameInput.classList.remove('is-invalid');
                }
                
                // 验证价格
                if (priceInput.value === '' || parseFloat(priceInput.value) <= 0) {
                    priceInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    priceInput.classList.remove('is-invalid');
                }
                
                // 验证分类
                if (categorySelect.value === '') {
                    categorySelect.classList.add('is-invalid');
                    isValid = false;
                } else {
                    categorySelect.classList.remove('is-invalid');
                }
                
                if (!isValid) {
                    e.preventDefault();
                    alert('请填写所有必填字段！');
                }
            });
            
            // 实时验证
            nameInput.addEventListener('input', function() {
                if (this.value.trim() !== '') {
                    this.classList.remove('is-invalid');
                }
            });
            
            priceInput.addEventListener('input', function() {
                if (this.value !== '' && parseFloat(this.value) > 0) {
                    this.classList.remove('is-invalid');
                }
            });
            
            categorySelect.addEventListener('change', function() {
                if (this.value !== '') {
                    this.classList.remove('is-invalid');
                }
            });
        });
    </script>
</body>
</html>
