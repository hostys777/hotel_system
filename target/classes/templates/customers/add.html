<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加客户 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 50%, #1f4e79 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 30px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        .form-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }
        .form-header h2 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-header p {
            color: #718096;
            margin: 0;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            display: block;
        }
        .form-control-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .form-control-modern:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }
        .btn-modern {
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
            color: white;
        }
        .btn-secondary-modern {
            background: #f1f5f9;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary-modern:hover {
            background: #e2e8f0;
            color: #2d3748;
            transform: translateY(-2px);
        }
        /* 豪华导航栏样式 */
        .luxury-navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.2);
        }
        .luxury-brand {
            font-weight: 700;
            color: #3b82f6 !important;
            font-size: 1.3rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .luxury-nav-link {
            color: #e2e8f0 !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 1rem !important;
        }
        .luxury-nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .luxury-nav-link:hover::before {
            width: 80%;
        }
        .luxury-nav-link:hover {
            color: #3b82f6 !important;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .luxury-nav-link.active {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.15);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .main-container {
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <!-- 豪华导航栏 -->
    <nav class="navbar navbar-expand-lg luxury-navbar">
        <div class="container">
            <a class="navbar-brand luxury-brand" href="/">
                <i class="fas fa-crown me-2"></i>皇家御苑酒店管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: #3b82f6;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/rooms">房间管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link active" href="/customers">客户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/employees">员工管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/reservations">预订管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/food-orders">餐饮订单</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/parking">停车管理</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="form-header">
                        <h2><i class="fas fa-plus me-3"></i>添加客户</h2>
                        <p>填写客户信息，为酒店添加新的客户</p>
                    </div>
                    
                    <form th:action="@{/customers/add}" th:object="${customer}" method="post">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name" class="form-label">姓名 *</label>
                                    <input type="text" class="form-control-modern" id="name" th:field="*{name}" 
                                           placeholder="请输入客户姓名" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="phone" class="form-label">电话</label>
                                    <input type="tel" class="form-control-modern" id="phone" th:field="*{phone}" 
                                           placeholder="请输入联系电话">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="email" class="form-label">邮箱</label>
                                    <input type="email" class="form-control-modern" id="email" th:field="*{email}" 
                                           placeholder="请输入邮箱地址">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="idCard" class="form-label">身份证号</label>
                                    <input type="text" class="form-control-modern" id="idCard" th:field="*{idCard}" 
                                           placeholder="请输入身份证号码">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="address" class="form-label">地址</label>
                            <textarea class="form-control-modern" id="address" th:field="*{address}" 
                                      rows="4" placeholder="请输入客户地址..."></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <a href="/customers" class="btn-modern btn-secondary-modern">
                                <i class="fas fa-arrow-left"></i>返回
                            </a>
                            <button type="submit" class="btn-modern btn-primary-modern">
                                <i class="fas fa-save"></i>保存客户
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
