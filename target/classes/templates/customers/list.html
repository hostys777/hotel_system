<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/button-styles.css" rel="stylesheet">
    <link href="/css/form-styles.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #3b82f6 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 30px;
        }
        .page-header {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 50%, #1e3a8a 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .customer-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .customer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #1e40af, #1e3a8a);
        }
        .customer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .customer-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            margin-right: 20px;
        }
        .customer-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }
        .customer-info {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 3px;
        }
        .customer-info i {
            color: #3b82f6;
            width: 16px;
            margin-right: 8px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-modern {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-edit {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
        }
        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
            color: white;
        }
        .btn-delete {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 101, 101, 0.3);
            color: white;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 500;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
            color: white;
        }
        .btn-success-modern {
            background: linear-gradient(135deg, #48bb78, #38a169);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 500;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-success-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #718096;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }
        .search-bar {
            background: white;
            border-radius: 25px;
            padding: 15px 25px;
            border: 2px solid #e2e8f0;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .search-bar:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .navbar-modern {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand-modern {
            font-weight: 700;
            color: #3b82f6 !important;
            font-size: 1.3rem;
        }
        .nav-link-modern {
            color: #4a5568 !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav-link-modern:hover {
            color: #3b82f6 !important;
            transform: translateY(-1px);
        }
        .nav-link-modern.active {
            color: #3b82f6 !important;
            font-weight: 600;
        }
        .modal-modern .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        .modal-modern .modal-header {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
        }
        .modal-modern .btn-close {
            filter: invert(1);
        }
        
        /* 豪华导航栏样式 */
        .luxury-navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        
        .luxury-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .luxury-nav-link {
            color: #f8f9fa !important;
            font-weight: 500;
            padding: 12px 20px !important;
            margin: 0 5px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .luxury-nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .luxury-nav-link:hover::before {
            left: 100%;
        }
        
        .luxury-nav-link:hover {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
        
        .luxury-nav-link.active {
            color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.15);
        }
        
        /* 调整主容器顶部间距 */
        .main-container {
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <!-- 豪华导航栏 -->
    <nav class="navbar navbar-expand-lg luxury-navbar">
        <div class="container">
            <a class="navbar-brand luxury-brand" href="/">
                <i class="fas fa-crown me-2"></i>皇家御苑酒店管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: #3b82f6;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/">
                            <i class="fas fa-home me-1"></i>首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/rooms">
                            <i class="fas fa-bed me-1"></i>房间管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link active" href="/customers">
                            <i class="fas fa-users me-1"></i>客户管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/employees">
                            <i class="fas fa-users-cog me-1"></i>员工管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/reservations">
                            <i class="fas fa-calendar-check me-1"></i>预订管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/food-orders">
                            <i class="fas fa-utensils me-1"></i>餐饮订单
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/parking">
                            <i class="fas fa-parking me-1"></i>停车管理
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-2"><i class="fas fa-users me-3"></i>客户管理</h1>
                    <p class="mb-0 opacity-75">管理酒店客户信息，查看客户详情和预订记录</p>
                </div>
                <div class="d-flex gap-3">
                    <a href="/customers/add" class="btn-luxury btn-luxury-primary">
                        <i class="fas fa-plus me-2"></i>添加客户
                    </a>
                    <button class="btn-luxury btn-luxury-success" data-bs-toggle="modal" data-bs-target="#searchModal">
                        <i class="fas fa-search me-2"></i>搜索客户
                    </button>
                </div>
            </div>
        </div>

        <!-- 错误和成功消息 -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(customers)}">0</div>
                <div class="stat-label">总客户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(customers.?[phone != null and phone != ''])}">0</div>
                <div class="stat-label">有电话客户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(customers.?[email != null and email != ''])}">0</div>
                <div class="stat-label">有邮箱客户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(customers.?[idCard != null and idCard != ''])}">0</div>
                <div class="stat-label">有身份证客户</div>
            </div>
        </div>

        <!-- 客户卡片网格 -->
        <div class="row" th:if="${#lists.size(customers) > 0}">
            <div class="col-lg-6 col-xl-4 mb-4" th:each="customer : ${customers}">
                <div class="customer-card">
                    <div class="d-flex align-items-start">
                        <div class="customer-avatar">
                            <span th:text="${#strings.substring(customer.name, 0, 1)}">A</span>
                        </div>
                        <div class="flex-grow-1">
                            <div class="customer-name" th:text="${customer.name}">张三</div>
                            <div class="customer-info" th:if="${customer.phone != null and customer.phone != ''}">
                                <i class="fas fa-phone"></i><span th:text="${customer.phone}">13800138000</span>
                            </div>
                            <div class="customer-info" th:if="${customer.email != null and customer.email != ''}">
                                <i class="fas fa-envelope"></i><span th:text="${customer.email}">zhang@example.com</span>
                            </div>
                            <div class="customer-info" th:if="${customer.idCard != null and customer.idCard != ''}">
                                <i class="fas fa-id-card"></i><span th:text="${customer.idCard}">123456789012345678</span>
                            </div>
                            <div class="customer-info" th:if="${customer.address != null and customer.address != ''}">
                                <i class="fas fa-map-marker-alt"></i><span th:text="${customer.address}">北京市朝阳区</span>
                            </div>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <a th:href="@{/customers/edit/{id}(id=${customer.id})}" 
                           class="btn-luxury btn-luxury-warning btn-luxury-sm">
                            <i class="fas fa-edit me-1"></i>编辑
                        </a>
                        <a th:href="@{/customers/delete/{id}(id=${customer.id})}" 
                           class="btn-luxury btn-luxury-danger btn-luxury-sm"
                           onclick="return confirm('确定要删除这个客户吗？')">
                            <i class="fas fa-trash me-1"></i>删除
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="text-center py-5" th:if="${#lists.isEmpty(customers)}">
            <div class="mb-4">
                <i class="fas fa-users" style="font-size: 4rem; color: #cbd5e0;"></i>
            </div>
            <h3 class="text-muted mb-3">暂无客户信息</h3>
            <p class="text-muted mb-4">开始添加您的第一个客户吧！</p>
            <a href="/customers/add" class="btn-luxury btn-luxury-primary">
                <i class="fas fa-plus me-2"></i>添加客户
            </a>
        </div>
    </div>

    <!-- 搜索模态框 -->
    <div class="modal fade modal-modern" id="searchModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-search me-2"></i>搜索客户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/customers/search}" method="get">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">客户姓名</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   placeholder="请输入客户姓名（支持模糊搜索）" 
                                   style="border-radius: 10px; border: 2px solid #e2e8f0; padding: 12px;">
                        </div>
                    </div>
                    <div class="modal-footer border-0 p-4">
                        <button type="button" class="btn-luxury btn-luxury-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn-luxury btn-luxury-primary">
                            <i class="fas fa-search me-2"></i>搜索
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
