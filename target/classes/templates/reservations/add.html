<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建预订 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 50%, #a569bd 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 20px;
            padding: 30px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(142, 68, 173, 0.1);
        }
        .form-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }
        .form-header h2 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-header p {
            color: #718096;
            margin: 0;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            display: block;
        }
        .form-control-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .form-control-modern:focus {
            outline: none;
            border-color: #8e44ad;
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
            background: white;
        }
        .form-select-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .form-select-modern:focus {
            outline: none;
            border-color: #8e44ad;
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
            background: white;
        }
        .btn-modern {
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: white;
        }
        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.3);
            color: white;
        }
        .btn-secondary-modern {
            background: #f1f5f9;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary-modern:hover {
            background: #e2e8f0;
            color: #2d3748;
            transform: translateY(-2px);
        }
        .navbar-modern {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand-modern {
            font-weight: 700;
            color: #8e44ad !important;
            font-size: 1.3rem;
        }
        .nav-link-modern {
            color: #4a5568 !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav-link-modern:hover {
            color: #8e44ad !important;
            transform: translateY(-1px);
        }
        .nav-link-modern.active {
            color: #8e44ad !important;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-modern">
        <div class="container">
            <a class="navbar-brand navbar-brand-modern" href="/">
                <i class="fas fa-hotel me-2"></i>酒店管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link nav-link-modern" href="/">首页</a>
                <a class="nav-link nav-link-modern" href="/rooms">房间管理</a>
                <a class="nav-link nav-link-modern" href="/customers">客户管理</a>
                <a class="nav-link nav-link-modern" href="/employees">员工管理</a>
                <a class="nav-link nav-link-modern active" href="/reservations">预订管理</a>
                <a class="nav-link nav-link-modern" href="/food-orders">餐饮订单</a>
                <a class="nav-link nav-link-modern" href="/parking">停车管理</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="form-header">
                        <h2><i class="fas fa-calendar-plus me-3"></i>创建预订</h2>
                        <p>为客人创建新的酒店预订</p>
                    </div>
                    
                    <form th:action="@{/reservations/add}" method="post">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="customerId" class="form-label">客户 *</label>
                                    <select class="form-select-modern" id="customerId" name="customerId" required>
                                        <option value="">请选择客户</option>
                                        <option th:each="customer : ${customers}" 
                                                th:value="${customer.id}" 
                                                th:text="${customer.name}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="roomNumber" class="form-label">房间 *</label>
                                    <select class="form-select-modern" id="roomNumber" name="roomNumber" required>
                                        <option value="">请选择房间</option>
                                        <option th:each="room : ${rooms}" 
                                                th:value="${room.roomNumber}" 
                                                th:text="${room.roomNumber}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="checkInDate" class="form-label">入住日期 *</label>
                                    <input type="date" class="form-control-modern" id="checkInDate" name="checkInDate" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="checkOutDate" class="form-label">退房日期 *</label>
                                    <input type="date" class="form-control-modern" id="checkOutDate" name="checkOutDate" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="remarks" class="form-label">备注</label>
                            <textarea class="form-control-modern" id="remarks" name="remarks" 
                                      rows="4" placeholder="请输入备注信息（可选）"></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <a href="/reservations" class="btn-modern btn-secondary-modern">
                                <i class="fas fa-arrow-left"></i>返回
                            </a>
                            <button type="submit" class="btn-modern btn-primary-modern">
                                <i class="fas fa-calendar-plus"></i>创建预订
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
