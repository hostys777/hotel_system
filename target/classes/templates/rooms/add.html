<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加房间 - 酒店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 215, 0, 0.2);
        }
        .form-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }
        .form-header h2 {
            color: #ffd700;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .form-header p {
            color: #718096;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: block;
            font-size: 0.95rem;
        }
        .form-control-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .form-control-modern:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
            background: white;
        }
        .form-select-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .form-select-modern:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
            background: white;
        }
        .btn-modern {
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a1a;
            font-weight: 700;
        }
        .btn-primary-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
            color: #1a1a1a;
            background: linear-gradient(135deg, #ffed4e, #ffd700);
        }
        .btn-secondary-modern {
            background: #f1f5f9;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary-modern:hover {
            background: #e2e8f0;
            color: #2d3748;
            transform: translateY(-2px);
        }
        /* 豪华导航栏样式 */
        .luxury-navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.2);
        }
        .luxury-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .luxury-nav-link {
            color: #f8f9fa !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 1rem !important;
        }
        .luxury-nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .luxury-nav-link:hover::before {
            width: 80%;
        }
        .luxury-nav-link:hover {
            color: #ffd700 !important;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .luxury-nav-link.active {
            color: #ffd700 !important;
            background: rgba(255, 215, 0, 0.15);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .main-container {
            margin-top: 80px;
        }
        .input-group-modern {
            position: relative;
            display: flex;
            align-items: stretch;
        }
        .input-group-modern .input-group-text {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #6b7280;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            white-space: nowrap;
        }
        .input-group-modern .form-control-modern {
            border-left: none;
            border-radius: 0 12px 12px 0;
            border-color: #e2e8f0;
            flex: 1;
        }
        .input-group-modern .form-control-modern:focus {
            border-left: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        /* 表单分区域样式 */
        .form-section {
            margin-bottom: 35px;
            padding: 25px;
            background: rgba(248, 250, 252, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            position: relative;
        }

        .form-section:last-of-type {
            margin-bottom: 0;
        }

        .section-title {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
        }

        .section-title i {
            color: #ffd700;
            font-size: 1rem;
        }

        /* 价格输入框样式 */
        .price-input {
            -moz-appearance: textfield;
        }
        
        .price-input::-webkit-outer-spin-button,
        .price-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- 豪华导航栏 -->
    <nav class="navbar navbar-expand-lg luxury-navbar">
        <div class="container">
            <a class="navbar-brand luxury-brand" href="/">
                <i class="fas fa-crown me-2"></i>皇家御苑酒店管理系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: var(--primary-gold);">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link active" href="/rooms">房间管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/customers">客户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/employees">员工管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/reservations">预订管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/food-orders">餐饮订单</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link luxury-nav-link" href="/parking">停车管理</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="form-header">
                        <h2><i class="fas fa-plus me-3"></i>添加房间</h2>
                        <p>填写房间信息，为酒店添加新的房间</p>
                    </div>
                    
                    <form th:action="@{/rooms/add}" th:object="${room}" method="post">
                        <!-- 基本信息区域 -->
                        <div class="form-section">
                            <h5 class="section-title">
                                <i class="fas fa-info-circle me-2"></i>基本信息
                            </h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="roomNumber" class="form-label">房间号 *</label>
                                        <input type="text" class="form-control-modern" id="roomNumber" th:field="*{roomNumber}" 
                                               placeholder="请输入房间号" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="roomType" class="form-label">房间类型 *</label>
                                        <select class="form-select-modern" id="roomType" th:field="*{roomType}" required>
                                            <option value="">请选择房间类型</option>
                                            <option th:each="type : ${roomTypes}" 
                                                    th:value="${type}" 
                                                    th:text="${type.description}"></option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 价格和状态区域 -->
                        <div class="form-section">
                            <h5 class="section-title">
                                <i class="fas fa-cog me-2"></i>价格与状态
                            </h5>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="price" class="form-label">价格 *</label>
                                        <div class="input-group-modern">
                                            <span class="input-group-text">¥</span>
                                            <input type="text" class="form-control-modern price-input" id="price" th:field="*{price}" 
                                                   placeholder="0.00" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="status" class="form-label">房间状态 *</label>
                                        <select class="form-select-modern" id="status" th:field="*{status}" required>
                                            <option th:each="status : ${roomStatuses}" 
                                                    th:value="${status}" 
                                                    th:text="${status.description}"></option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 描述区域 -->
                        <div class="form-section">
                            <h5 class="section-title">
                                <i class="fas fa-file-text me-2"></i>房间描述
                            </h5>
                            <div class="form-group">
                                <textarea class="form-control-modern" id="description" th:field="*{description}" 
                                          rows="4" placeholder="请输入房间描述，如：舒适的标准间，配备现代化设施..."></textarea>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <a href="/rooms" class="btn-modern btn-secondary-modern">
                                <i class="fas fa-arrow-left"></i>返回
                            </a>
                            <button type="submit" class="btn-modern btn-primary-modern">
                                <i class="fas fa-save"></i>保存房间
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 价格输入验证
        document.getElementById('price').addEventListener('input', function(e) {
            // 只允许数字和一个小数点
            let value = e.target.value.replace(/[^0-9.]/g, '');
            
            // 确保只有一个小数点
            let parts = value.split('.');
            if (parts.length > 2) {
                value = parts[0] + '.' + parts.slice(1).join('');
            }
            
            // 限制小数点后最多两位
            if (parts.length === 2 && parts[1].length > 2) {
                value = parts[0] + '.' + parts[1].substring(0, 2);
            }
            
            e.target.value = value;
        });
        
        // 表单提交前验证价格格式
        document.querySelector('form').addEventListener('submit', function(e) {
            const priceInput = document.getElementById('price');
            const price = parseFloat(priceInput.value);
            
            if (isNaN(price) || price < 0) {
                e.preventDefault();
                alert('请输入有效的价格（大于等于0的数字）');
                priceInput.focus();
                return false;
            }
        });
    </script>
</body>
</html>
